site_name: bubseek
repo_url: https://github.com/ob-labs/bubseek
site_description: A Bub distribution for data-driven insight workflows, powered by OceanBase seekdb
edit_uri: edit/main/docs/
repo_name: ob-labs/bubseek

nav:
  - Home: index.md
  - Getting started: getting-started.md
  - Configuration: configuration.md
  - Architecture: architecture.md
  - Development: development.md
plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: ["src/bubseek"]
theme:
  name: material
  feature:
    tabs: true
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: white
      accent: deep orange
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: deep orange
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  icon:
    repo: fontawesome/brands/github

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/ob-labs/bubseek
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/bubseek

markdown_extensions:
  - toc:
      permalink: true
  - pymdownx.arithmatex:
      generic: true
