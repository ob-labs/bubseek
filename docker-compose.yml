services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bubseek
    env_file:
      - .env
    volumes:
      - ${BUB_WORKSPACE_PATH:-.}:/workspace
      - ${BUB_HOME:-${HOME}/.bub}:/data
      - ${BUB_AGENT_HOME:-${HOME}/.agents}:/root/.agents
    stdin_open: true
    tty: true
    restart: unless-stopped
